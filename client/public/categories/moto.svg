<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bodyM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Frame/chassis -->
  <path d="M140,100 L180,60 L240,55 L280,65 L290,90 L260,110 L140,110 Z" fill="url(#bodyM)" stroke="#333" stroke-width="1.5"/>
  <!-- Fuel tank -->
  <path d="M170,62 Q185,48 220,48 Q240,48 245,58 L240,68 L180,70 Z" fill="#0f4c75" stroke="#1a5a85" stroke-width="1"/>
  <!-- Seat -->
  <path d="M240,58 L290,65 L300,72 L290,78 L245,70 Z" fill="#222" stroke="#333" stroke-width="1"/>
  <!-- Engine -->
  <rect x="195" y="85" width="45" height="25" rx="5" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <rect x="200" y="90" width="10" height="8" rx="2" fill="#555"/>
  <rect x="215" y="90" width="10" height="8" rx="2" fill="#555"/>
  <!-- Exhaust pipes -->
  <path d="M280,100 Q310,100 330,108 L340,108 L340,112 L328,112 Q308,105 280,105 Z" fill="#555" stroke="#666" stroke-width="0.8"/>
  <path d="M340,106" fill="none" stroke="#666" stroke-width="0.5"/>
  <!-- Front fork -->
  <line x1="155" y1="70" x2="130" y2="138" stroke="#555" stroke-width="4"/>
  <line x1="160" y1="72" x2="136" y2="138" stroke="#555" stroke-width="4"/>
  <!-- Rear swing arm -->
  <line x1="260" y1="105" x2="300" y2="138" stroke="#444" stroke-width="4"/>
  <!-- Headlight -->
  <circle cx="140" cy="72" r="10" fill="#fff8dc" stroke="#ccc" stroke-width="1"/>
  <circle cx="140" cy="72" r="6" fill="#ffffe0"/>
  <!-- Taillight -->
  <rect x="305" y="68" width="8" height="5" rx="1" fill="#e33"/>
  <!-- Handlebar -->
  <line x1="150" y1="55" x2="165" y2="50" stroke="#555" stroke-width="3"/>
  <line x1="150" y1="55" x2="140" y2="48" stroke="#555" stroke-width="3"/>
  <!-- Mirrors -->
  <ellipse cx="138" cy="46" rx="5" ry="3" fill="#444"/>
  <ellipse cx="167" cy="48" rx="5" ry="3" fill="#444"/>
  <!-- Fenders -->
  <path d="M110,130 Q100,115 115,110 Q130,108 140,115 Q155,125 145,135" fill="#1a1a2e" stroke="#333" stroke-width="1" fill-opacity="0.8"/>
  <path d="M280,130 Q270,115 285,108 Q300,105 315,112 Q328,122 320,135" fill="#1a1a2e" stroke="#333" stroke-width="1" fill-opacity="0.8"/>
  <!-- Front wheel -->
  <circle cx="133" cy="140" r="28" fill="#1a1a1a"/>
  <circle cx="133" cy="140" r="22" fill="#333"/>
  <circle cx="133" cy="140" r="15" fill="#222"/>
  <circle cx="133" cy="140" r="4" fill="#888"/>
  <!-- Front wheel tread -->
  <circle cx="133" cy="140" r="26" fill="none" stroke="#444" stroke-width="3"/>
  <!-- Rear wheel -->
  <circle cx="300" cy="140" r="28" fill="#1a1a1a"/>
  <circle cx="300" cy="140" r="22" fill="#333"/>
  <circle cx="300" cy="140" r="15" fill="#222"/>
  <circle cx="300" cy="140" r="4" fill="#888"/>
  <circle cx="300" cy="140" r="26" fill="none" stroke="#444" stroke-width="3"/>
  <!-- Spokes -->
  <line x1="133" y1="118" x2="133" y2="162" stroke="#555" stroke-width="1"/>
  <line x1="111" y1="140" x2="155" y2="140" stroke="#555" stroke-width="1"/>
  <line x1="300" y1="118" x2="300" y2="162" stroke="#555" stroke-width="1"/>
  <line x1="278" y1="140" x2="322" y2="140" stroke="#555" stroke-width="1"/>
  <!-- Shadow -->
  <ellipse cx="215" cy="172" rx="120" ry="5" fill="rgba(0,0,0,0.1)"/>
</svg>