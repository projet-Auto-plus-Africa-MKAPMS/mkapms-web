<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bodyS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a6a7a"/>
      <stop offset="100%" stop-color="#3a4a5a"/>
    </linearGradient>
    <linearGradient id="glassS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0d0e8"/>
      <stop offset="100%" stop-color="#6aaccc"/>
    </linearGradient>
  </defs>
  <!-- Body - higher and boxier than sedan -->
  <path d="M50,125 L60,125 L65,90 Q72,65 110,55 L200,48 Q260,46 300,55 L320,65 Q345,78 350,95 L355,125 L370,125 L370,138 L40,138 L40,125 Z" fill="url(#bodyS)" stroke="#3a4a5a" stroke-width="1.5"/>
  <!-- Roof - taller -->
  <path d="M120,55 Q130,25 175,22 L265,22 Q300,24 315,45 L320,65" fill="url(#bodyS)" stroke="#3a4a5a" stroke-width="1.5"/>
  <!-- Windows -->
  <path d="M130,52 Q138,28 178,26 L220,26 L220,50 Z" fill="url(#glassS)" stroke="#5a8a9f" stroke-width="1"/>
  <path d="M225,26 L272,26 Q295,28 308,48 L308,62 L225,50 Z" fill="url(#glassS)" stroke="#5a8a9f" stroke-width="1"/>
  <!-- Small rear window -->
  <path d="M312,48 Q316,42 318,48 L318,58 L312,62 Z" fill="url(#glassS)" stroke="#5a8a9f" stroke-width="0.8"/>
  <!-- Headlight -->
  <path d="M55,98 Q48,95 48,105 Q48,112 55,110 L68,108 L68,100 Z" fill="#fff8dc" stroke="#666" stroke-width="0.5"/>
  <!-- Taillight -->
  <rect x="358" y="98" width="10" height="16" rx="2" fill="#e33" stroke="#c22" stroke-width="0.5"/>
  <!-- Wheel arches - pronounced -->
  <path d="M70,125 Q70,105 95,105 Q120,105 120,125" fill="none" stroke="#2a3a4a" stroke-width="3"/>
  <path d="M290,125 Q290,105 315,105 Q340,105 340,125" fill="none" stroke="#2a3a4a" stroke-width="3"/>
  <!-- Door lines -->
  <line x1="220" y1="50" x2="220" y2="125" stroke="#2a3a4a" stroke-width="1"/>
  <!-- Door handle -->
  <rect x="230" y="82" width="16" height="4" rx="2" fill="#4a5a6a"/>
  <!-- Roof rails -->
  <line x1="135" y1="22" x2="305" y2="22" stroke="#7a8a9a" stroke-width="3"/>
  <rect x="155" y="18" width="6" height="6" rx="1" fill="#5a6a7a"/>
  <rect x="250" y="18" width="6" height="6" rx="1" fill="#5a6a7a"/>
  <!-- Bumpers -->
  <path d="M40,125 Q32,125 32,130 L32,140 L55,140 L55,138 L40,138 Z" fill="#3a4a5a"/>
  <path d="M370,125 Q378,125 378,130 L378,140 L355,140 L355,138 L370,138 Z" fill="#3a4a5a"/>
  <!-- Skid plate -->
  <rect x="38" y="135" width="30" height="4" rx="1" fill="#888"/>
  <rect x="345" y="135" width="30" height="4" rx="1" fill="#888"/>
  <!-- Wheels - larger -->
  <circle cx="95" cy="140" r="26" fill="#1a1a1a"/>
  <circle cx="95" cy="140" r="18" fill="#333"/>
  <circle cx="95" cy="140" r="11" fill="#555"/>
  <circle cx="95" cy="140" r="4" fill="#888"/>
  <circle cx="315" cy="140" r="26" fill="#1a1a1a"/>
  <circle cx="315" cy="140" r="18" fill="#333"/>
  <circle cx="315" cy="140" r="11" fill="#555"/>
  <circle cx="315" cy="140" r="4" fill="#888"/>
  <!-- Spokes -->
  <line x1="95" y1="122" x2="95" y2="158" stroke="#666" stroke-width="1.5"/>
  <line x1="77" y1="140" x2="113" y2="140" stroke="#666" stroke-width="1.5"/>
  <line x1="315" y1="122" x2="315" y2="158" stroke="#666" stroke-width="1.5"/>
  <line x1="297" y1="140" x2="333" y2="140" stroke="#666" stroke-width="1.5"/>
  <!-- Shadow -->
  <ellipse cx="205" cy="170" rx="165" ry="7" fill="rgba(0,0,0,0.1)"/>
</svg>