<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bodySc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2176ab"/>
    </linearGradient>
  </defs>
  <!-- Rear body/fender -->
  <path d="M260,80 Q280,70 300,75 L310,85 L310,120 Q310,130 300,132 L270,132 L260,120 Z" fill="url(#bodySc)" stroke="#1a6090" stroke-width="1.5"/>
  <!-- Seat -->
  <path d="M175,72 Q180,62 220,60 L280,62 Q295,65 295,72 L280,78 L185,78 Z" fill="#222" stroke="#333" stroke-width="1"/>
  <!-- Front shield/leg guard -->
  <path d="M120,55 Q115,50 118,40 L125,35 L140,35 L145,40 Q148,50 142,80 L142,125 L118,125 L118,80 Z" fill="url(#bodySc)" stroke="#1a6090" stroke-width="1.5"/>
  <!-- Floor board -->
  <path d="M142,118 L260,118 L260,128 L142,128 Z" fill="#444" stroke="#333" stroke-width="1"/>
  <!-- Handlebar column -->
  <rect x="126" y="40" width="8" height="45" rx="2" fill="#666" stroke="#555" stroke-width="1"/>
  <!-- Handlebars -->
  <line x1="115" y1="38" x2="145" y2="38" stroke="#555" stroke-width="4"/>
  <!-- Mirrors -->
  <ellipse cx="112" cy="35" rx="6" ry="4" fill="#444" stroke="#333" stroke-width="0.5"/>
  <ellipse cx="148" cy="35" rx="6" ry="4" fill="#444" stroke="#333" stroke-width="0.5"/>
  <!-- Headlight -->
  <path d="M122,52 Q115,50 115,58 Q115,65 122,63 L130,62 L130,55 Z" fill="#fff8dc" stroke="#ccc" stroke-width="0.5"/>
  <!-- Taillight -->
  <rect x="312" y="90" width="6" height="10" rx="1" fill="#e33"/>
  <!-- Front fender -->
  <path d="M90,132 Q80,115 95,108 Q112,102 125,108 Q140,118 135,132" fill="url(#bodySc)" stroke="#1a6090" stroke-width="1.5"/>
  <!-- Rear fender -->
  <path d="M270,132 Q260,115 275,108 Q292,102 305,108 Q320,118 315,132" fill="url(#bodySc)" stroke="#1a6090" stroke-width="1.5"/>
  <!-- Exhaust -->
  <path d="M285,120 Q300,122 315,128 L320,128 L320,132 L314,132 Q298,126 285,124 Z" fill="#888" stroke="#777" stroke-width="0.5"/>
  <!-- Stand -->
  <line x1="200" y1="128" x2="210" y2="162" stroke="#666" stroke-width="2.5"/>
  <!-- Front wheel -->
  <circle cx="112" cy="142" r="24" fill="#1a1a1a"/>
  <circle cx="112" cy="142" r="18" fill="#333"/>
  <circle cx="112" cy="142" r="11" fill="#222"/>
  <circle cx="112" cy="142" r="4" fill="#888"/>
  <circle cx="112" cy="142" r="22" fill="none" stroke="#444" stroke-width="3"/>
  <!-- Rear wheel - smaller -->
  <circle cx="292" cy="142" r="20" fill="#1a1a1a"/>
  <circle cx="292" cy="142" r="14" fill="#333"/>
  <circle cx="292" cy="142" r="8" fill="#222"/>
  <circle cx="292" cy="142" r="3" fill="#888"/>
  <circle cx="292" cy="142" r="18" fill="none" stroke="#444" stroke-width="3"/>
  <!-- Spokes -->
  <line x1="112" y1="124" x2="112" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="94" y1="142" x2="130" y2="142" stroke="#555" stroke-width="1"/>
  <line x1="292" y1="128" x2="292" y2="156" stroke="#555" stroke-width="1"/>
  <line x1="278" y1="142" x2="306" y2="142" stroke="#555" stroke-width="1"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="168" rx="130" ry="5" fill="rgba(0,0,0,0.08)"/>
</svg>