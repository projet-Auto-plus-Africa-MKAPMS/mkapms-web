  </defs>
  <!-- Body -->
  <path d="M55,128 L65,128 L70,100 Q78,78 110,68 L190,58 Q240,55 280,60 L310,72 Q330,82 340,100 L348,128 L360,128 L360,138 L45,138 L45,128 Z" fill="url(#bodyB)" stroke="#444" stroke-width="1.5"/>
