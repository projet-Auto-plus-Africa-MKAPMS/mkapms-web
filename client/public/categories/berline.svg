  <path d="M148,65 Q155,40 192,38 L225,38 L225,62 Z" fill="url(#glassB)" stroke="#4a8a9f" stroke-width="1"/>
  <path d="M230,38 L270,38 Q290,40 300,58 L300,70 L230,62 Z" fill="url(#glassB)" stroke="#4a8a9f" stroke-width="1"/>
