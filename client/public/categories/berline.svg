  <line x1="265" y1="60" x2="265" y2="128" stroke="#333" stroke-width="1"/>
  <!-- Door handles -->
  <rect x="205" y="92" width="16" height="4" rx="2" fill="#555"/>
  <rect x="275" y="90" width="16" height="4" rx="2" fill="#555"/>
  <!-- Bumpers -->
  <path d="M45,128 Q38,128 38,133 L38,140 L58,140 L58,138 L45,138 Z" fill="#222"/>
  <path d="M360,128 Q368,128 368,133 L368,140 L348,140 L348,138 L360,138 Z" fill="#222"/>
  <!-- Wheels -->
  <circle cx="110" cy="140" r="24" fill="#1a1a1a"/>
  <circle cx="110" cy="140" r="16" fill="#333"/>
  <circle cx="110" cy="140" r="10" fill="#555"/>
  <circle cx="110" cy="140" r="4" fill="#888"/>
  <circle cx="310" cy="140" r="24" fill="#1a1a1a"/>
  <circle cx="310" cy="140" r="16" fill="#333"/>
  <circle cx="310" cy="140" r="10" fill="#555"/>
  <circle cx="310" cy="140" r="4" fill="#888"/>
  <!-- Spokes -->
  <line x1="110" y1="124" x2="110" y2="156" stroke="#666" stroke-width="1.5"/>
  <line x1="94" y1="140" x2="126" y2="140" stroke="#666" stroke-width="1.5"/>
  <line x1="310" y1="124" x2="310" y2="156" stroke="#666" stroke-width="1.5"/>
  <line x1="294" y1="140" x2="326" y2="140" stroke="#666" stroke-width="1.5"/>
  <!-- Shadow -->
  <ellipse cx="210" cy="168" rx="160" ry="6" fill="rgba(0,0,0,0.1)"/>
