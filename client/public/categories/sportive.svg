<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bodySp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc2222"/>
      <stop offset="100%" stop-color="#991111"/>
    </linearGradient>
    <linearGradient id="glassSp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>
  <!-- Body - low and sleek -->
  <path d="M45,128 L55,128 L58,105 Q65,82 100,72 L180,62 Q220,58 260,62 L310,72 Q345,82 352,105 L358,128 L375,128 L375,136 L35,136 L35,128 Z" fill="url(#bodySp)" stroke="#881111" stroke-width="1.5"/>
  <!-- Roof - very low -->
  <path d="M175,62 Q185,44 210,42 L260,42 Q280,44 290,55 L310,72" fill="url(#bodySp)" stroke="#881111" stroke-width="1.5"/>
  <!-- Windshield - raked back -->
  <path d="M178,60 Q186,46 212,44 L248,44 L248,58 L195,60 Z" fill="url(#glassSp)" stroke="#333" stroke-width="1"/>
  <!-- Rear window -->
  <path d="M252,44 L275,44 Q288,46 295,58 L295,68 L252,58 Z" fill="url(#glassSp)" stroke="#333" stroke-width="1"/>
  <!-- Headlight - aggressive -->
  <path d="M50,108 Q42,105 42,112 Q42,118 50,116 L65,114 L65,108 Z" fill="#fff8dc" stroke="#666" stroke-width="0.5"/>
  <!-- Taillight -->
  <rect x="362" y="108" width="12" height="10" rx="2" fill="#e33" stroke="#c22" stroke-width="0.5"/>
  <!-- Air intake -->
  <rect x="58" y="118" width="30" height="6" rx="2" fill="#661111"/>
  <!-- Side scoop -->
  <path d="M200,90 L230,88 L230,98 L210,100 Z" fill="#881111" stroke="#771111" stroke-width="0.5"/>
  <!-- Door line -->
  <line x1="248" y1="58" x2="248" y2="128" stroke="#771111" stroke-width="1"/>
  <!-- Door handle -->
  <rect x="255" y="88" width="14" height="3" rx="1.5" fill="#aa2222"/>
  <!-- Side skirt -->
  <rect x="90" y="126" width="230" height="5" rx="1" fill="#661111"/>
  <!-- Spoiler -->
  <path d="M345,95 L372,88 L376,92 L350,100 Z" fill="#881111" stroke="#661111" stroke-width="1"/>
  <!-- Bumpers -->
  <path d="M35,128 Q28,128 28,132 L28,138 L50,138 L50,136 L35,136 Z" fill="#771111"/>
  <path d="M375,128 Q382,128 382,132 L382,138 L362,138 L362,136 L375,136 Z" fill="#771111"/>
  <!-- Wheels - sport -->
  <circle cx="105" cy="140" r="24" fill="#111"/>
  <circle cx="105" cy="140" r="17" fill="#222"/>
  <circle cx="105" cy="140" r="11" fill="#444"/>
  <circle cx="105" cy="140" r="4" fill="#999"/>
  <circle cx="325" cy="140" r="24" fill="#111"/>
  <circle cx="325" cy="140" r="17" fill="#222"/>
  <circle cx="325" cy="140" r="11" fill="#444"/>
  <circle cx="325" cy="140" r="4" fill="#999"/>
  <!-- 5-spoke pattern -->
  <line x1="105" y1="123" x2="105" y2="157" stroke="#666" stroke-width="2"/>
  <line x1="88" y1="140" x2="122" y2="140" stroke="#666" stroke-width="2"/>
  <line x1="93" y1="128" x2="117" y2="152" stroke="#666" stroke-width="1.5"/>
  <line x1="93" y1="152" x2="117" y2="128" stroke="#666" stroke-width="1.5"/>
  <line x1="325" y1="123" x2="325" y2="157" stroke="#666" stroke-width="2"/>
  <line x1="308" y1="140" x2="342" y2="140" stroke="#666" stroke-width="2"/>
  <line x1="313" y1="128" x2="337" y2="152" stroke="#666" stroke-width="1.5"/>
  <line x1="313" y1="152" x2="337" y2="128" stroke="#666" stroke-width="1.5"/>
  <!-- Shadow -->
  <ellipse cx="210" cy="168" rx="170" ry="6" fill="rgba(0,0,0,0.12)"/>
</svg>